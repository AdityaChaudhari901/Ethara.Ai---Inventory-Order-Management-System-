# Render Blueprint: deploys the FastAPI backend as a Docker web service plus a
# free managed PostgreSQL instance. The frontend deploys separately on Vercel.
# Render injects DATABASE_URL from the managed database; nothing is hardcoded.
services:
  - type: web
    name: inventory-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        # Set this to your Vercel frontend URL once it exists, e.g.
        # https://your-frontend.vercel.app
        value: "*"
      - key: LOW_STOCK_THRESHOLD
        value: "10"

databases:
  - name: inventory-db
    plan: free
    databaseName: inventory
    user: inventory
